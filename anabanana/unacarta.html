<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta de Cumpleaños</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Georgia, serif;
    background:linear-gradient(135deg,#fff5ea,#ffd9d9);
}

/* CHECKBOX OCULTO */

#abrir{
    display:none;
}

/* FONDO OSCURO */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0);
    transition:1s;
    z-index:10;
}

#abrir:checked ~ .overlay{
    background:rgba(0,0,0,.65);
}

/* FOTOS DEL FONDO */

.recuerdo{
    position:fixed;
    width:200px;
    padding:13px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:1s;
}

.recuerdo img{
    width:100%;
    display:block;
}

.f1{
    top:10%;
    left:10%;
    transform:rotate(-15deg);
}

.f2{
    top:5%;
    right:4%;
    transform:rotate(10deg);
}

.f3{
    bottom:20%;
    left:10%;
    transform:rotate(8deg);
}

.f4{
    bottom:4%;
    right:4%;
    transform:rotate(-12deg);
}

.f5{
    top:50%;
    left:1%;
    transform:rotate(-6deg);
}

.f6{
    top:42%;
    right:1%;
    transform:rotate(14deg);
}

#abrir:checked ~ .recuerdo{
    filter:brightness(40%);
}

/* SOBRE */

.contenedor{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:20;
}

.sobre{
    position:relative;
    width:320px;
    height:220px;
    cursor:pointer;
}

.base{
    position:absolute;
    width:100%;
    height:100%;
    background:#d96c6c;
    border-radius:0 0 15px 15px;
}

.tapa{
    position:absolute;
    width:0;
    height:0;
    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-top:120px solid #c75656;
    transform-origin:top;
    transition:1s;
    z-index:5;
}

#abrir:checked + .overlay + .recuerdo + .recuerdo + .recuerdo + .recuerdo + .recuerdo + .recuerdo + .contenedor .tapa{
    transform:rotateX(180deg);
}

#abrir:checked + .overlay + .recuerdo + .recuerdo + .recuerdo + .recuerdo + .recuerdo + .recuerdo + .contenedor{
    pointer-events:none;
}

/* CARTA */

.carta{
    position:fixed;
    top:50%;
    left:50%;

    width:90%;
    max-width:800px;

    height:85vh;

    background:#fffdf8;

    border-radius:20px;

    padding:30px;

    overflow-y:auto;

    transform:translate(-50%,-50%) scale(.7);

    opacity:0;

    visibility:hidden;

    transition:1s;

    z-index:100;

    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

#abrir:checked ~ .carta{
    opacity:1;
    visibility:visible;
    transform:translate(-50%,-50%) scale(1);
}

.carta h1{
    text-align:center;
    color:#c75656;
    margin-bottom:20px;
}

.carta p{
    color:#654646;
    line-height:1.8;
    margin-bottom:20px;
}

.carta img{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;
}

/* INDICACIÓN */

.mensaje{
    position:absolute;
    bottom:-50px;
    width:100%;
    text-align:center;
    color:#b34d4d;
    font-size:22px;
}

</style>
</head>
<body>

<input type="checkbox" id="abrir">

<div class="overlay"></div>

<div class="recuerdo f1"><img src="foto1.jpeg"></div>
<div class="recuerdo f2"><img src="fototo2.jpeg"></div>
<div class="recuerdo f3"><img src="foto4.jpeg"></div>
<div class="recuerdo f4"><img src="foto5.jpeg"></div>
<div class="recuerdo f5"><img src="WhatsApp Image 2026-06-02 at 8.57.26 PM.jpeg"></div>
<div class="recuerdo f6"><img src="foto3.jpeg"></div>

<div class="contenedor">
    <label for="abrir" class="sobre" id="sobreLabel">

        <div class="tapa"></div>

        <div class="base"></div>

        <div class="mensaje">
            ✉️ Haz clic en el sobre
        </div>

    </label>
</div>

<div class="carta">

    <h1></h1>

    <img src="carta a ti .jpeg" alt="Foto principal">

</div>

<audio id="musicaFondo" src="cancion.mpeg" loop></audio>

<script>
    const sobre = document.getElementById('sobreLabel');
    const musica = document.getElementById('musicaFondo');

    sobre.addEventListener('click', () => {
        // Un pequeño retraso para que coincida con la animación del sobre abriéndose
        setTimeout(() => {
            musica.play().catch(error => {
                console.log("La reproducción automática fue bloqueada o el archivo no existe:", error);
            });
        }, 300); 
    });
</script>

</body>
</html>
